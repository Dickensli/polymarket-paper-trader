# Copy these trigger blocks into the Polymarket US SmithConfig. Secrets and MCP
# server configuration are intentionally excluded from this file.

triggers {
  id: "conservative_retro"
  schedule { schedule: "0 */2 * * *" }
  prompt: "Run Polymarket US conservative arbitrage with cross-session memory. Strategy ID 'conservative_retro'; use only polymarket-us-mcp.\n\nFRESH-START RULE: Never call init_account unless the human explicitly requests a reset in the active conversation. Empty reports/history with exactly $10,000 cash is a deliberate new inception; never restore or re-acquire deleted positions from memory.\n\nBOOTSTRAP: Re-register every cycle with is_paper_trading=true, platform='polymarket_us', schedule='0 */2 * * *', risk_config={max_single_trade_pct:0.05,max_market_exposure_pct:0.10,min_cash_reserve_pct:0.15}; call get_strategy_context; read the latest 3 reports; call get_balance, portfolio, history, stats. If NAV <= 0, save a no-trade report and stop. Current tool state always overrides old reports.\n\nDATA-INTEGRITY GATE: Confirm exact slug/title/rules/status/close time. Call get_market_book separately for YES and NO. YES BUY must use YES ask; NO BUY must use the NO ask implied by the opposite YES book side. If YES and NO have the same price, sum implausibly below 1, one side is absent, or reported price differs from the displayed outcome quote, re-fetch once and then record DATA_INTEGRITY_ALERT; do not trade. Never exploit 'Side 0', complement, midpoint, or server-pricing bugs.\n\nARBITRAGE DEFINITION: Outcomes must be mutually exclusive and exhaustive under identical settlement rules. Every leg must have executable depth for full intended size. Total asks plus spread/fees/slippage must be <=0.95 per $1 settlement basket after every leg fills. Directional estimates, paired party contracts, cheap NO tails, delta-neutral labels, and same-price YES/NO are not arbitrage. Verify event facts with public sources including URL and timestamp.\n\nSTRUCTURED BUY GATE: Every BUY must include the complete proposal object exposed by the tool: honest thesis, verified rules, timestamped source URLs, fair probability and interval, fresh observed outcome price/depth/time, net edge, NAV fraction, exit and invalidation. Never alter claims to pass server validation.\n\nVALUATION: Treat only the executable SELL side as current position value. Never call longQuote, shortQuote, currentPx, midpoint, entry cost, or top ask realized NAV. A position without sufficient exit bids is illiquid risk, not profit.\n\nRISK/EXECUTION: Quarter-Kelly only reduces size. Hard limits: 5% per trade, 10% cumulative market/event across YES+NO, 20% category, 15% cash, maximum one arb set/cycle. Never force cash deployment or average down. Use market orders only, no caller price. Preflight every leg, execute the least-liquid leg first, and if a later leg fails immediately unwind already-filled legs at executable depth; report residual exposure and never describe a partial basket as guaranteed.\n\nREPORT: Save YYYY-MM-DDTHH:MM:SS.md containing tool-returned Portfolio Status, Data Integrity Audit, Sources, Rejected Candidates, exact Trades/Fills, settlement-basket math, Risk Audit, Lessons, and Next Steps. Distinguish realized/unrealized PnL and submitted/filled. Structured server-verified portfolio/trade summaries override narrative text. Always pass strategy_id='conservative_retro'. Execute now."
}

triggers {
  id: "high_freq_retro"
  schedule { schedule: "*/15 * * * *" }
  prompt: "Run a short-horizon Polymarket US tactical strategy; do not claim to market-make because the available tools submit taker market orders only. Strategy ID 'high_freq_retro'; use only polymarket-us-mcp.\n\nFRESH-START RULE: Never call init_account unless the human explicitly requests a reset in the active conversation. Empty reports/history with exactly $10,000 cash is a deliberate new inception; never restore or re-acquire deleted positions from memory.\n\nBOOTSTRAP: Re-register with is_paper_trading=true, platform='polymarket_us', schedule='*/15 * * * *', risk_config={max_single_trade_pct:0.03,max_market_exposure_pct:0.10,min_cash_reserve_pct:0.15}; call get_strategy_context; read the latest 3 reports; call get_balance/portfolio/history/stats. If NAV <= 0, report and stop. Prior reports are hypotheses only: never inherit another strategy's guidance or an old numeric trigger unless this prompt defines it and current market data independently validates it.\n\nDATA-INTEGRITY GATE: Confirm slug, rules, status, close time, and outcome semantics. Call get_market_book separately for YES and NO. Validate complement pricing and executable side exactly as in conservative_retro. Identical YES/NO prices, implausible complements, missing book sides, stale quotes, or discontinuous portfolio gains are DATA_INTEGRITY_ALERT conditions: re-fetch once, make no trade, and report. Never exploit a server bug even if prior reports call it profitable.\n\nELIGIBILITY: Trade only simple binaries expected to resolve within 7 days or with a documented near-term catalyst. Require spread <=2 points, displayed depth >=3x intended size, and >=6% net edge after spread/fees/slippage. Large resting walls are not proof they will absorb unlimited size; size to depth. Evaluate an open position from its own contract book and catalyst; a related proxy market's resting wall is never sufficient by itself to enter, add, or hold. No illiquid player props, long-dated political cash parking, forced deployment, or positions with no exit bid.\n\nHARD LIMITS: 3% per trade, 10% cumulative market/event across both outcomes, 20% category, 15% cash, maximum 2 trades/cycle and 8/day. Stop at 2% daily loss or 5% drawdown. No averaging down, martingale, recovery trading, or turning a failed scalp into hold-to-settlement. Every cycle must revalidate a time-bounded exit or invalidation condition for each position; otherwise reduce or exit at executable depth.\n\nSTRUCTURED BUY GATE: Every BUY includes the complete honest proposal object exposed by the tool, based on the fresh selected-outcome book and timestamped public sources. Do not manipulate price, depth, edge, or NAV claims to pass validation.\n\nVALUATION: Current value is executable SELL-side liquidation value only. Do not treat longQuote, shortQuote, currentPx, midpoint, cost/exposure, or an unlimited top-of-book mark as NAV.\n\nEXECUTE/VERIFY: Use market orders without a price. After every order verify fill quantity, fill price, cash delta, position delta, and remaining orders. Stop on mismatch or partial fill.\n\nREPORT: Save a timestamped report with Data Integrity, exact fills, holding-time/turnover metrics, rejected candidates, liquidity and risk audits, lessons, and next steps. Values must come from tools; never extrapolate top-of-book to unlimited size. Structured server-verified portfolio/trade summaries override narrative text. Always pass strategy_id='high_freq_retro'. Execute now."
}
